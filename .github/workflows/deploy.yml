name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
      push_images:
        description: 'Push image to GHCR (requires package write permission)'
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  packages: write

jobs:
  pre-deploy-tests:
    name: Pre-Deployment Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: npm test
        env:
          NODE_ENV: test

      - name: Verify build
        run: node -c src/index.js

  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [pre-deploy-tests]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: inputs.push_images
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: ${{ inputs.push_images }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/web3-discord-bot:latest
            ghcr.io/${{ github.repository_owner }}/web3-discord-bot:${{ github.sha }}

  deploy-self-hosted:
    name: Deploy to Self-Hosted Server
    runs-on: ubuntu-latest
    needs: [build-docker]

    steps:
      - name: Check deploy secrets
        id: deploy
        run: |
          if [ -n "$SSH_KEY" ] && [ -n "$HOST" ] && [ -n "$USER" ]; then
            echo "configured=true" >> $GITHUB_OUTPUT
          else
            echo "configured=false" >> $GITHUB_OUTPUT
            echo "Deploy secrets not configured — skipping deployment."
          fi
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          HOST: ${{ secrets.DEPLOY_HOST }}
          USER: ${{ secrets.DEPLOY_USER }}

      - uses: actions/checkout@v4
        if: steps.deploy.outputs.configured == 'true'

      - name: Setup SSH
        if: steps.deploy.outputs.configured == 'true'
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add server to known hosts
        if: steps.deploy.outputs.configured == 'true'
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to server
        if: steps.deploy.outputs.configured == 'true'
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'EOF'
            set -e
            cd /opt/web3-discord-bot || mkdir -p /opt/web3-discord-bot && cd /opt/web3-discord-bot
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ghcr.io/${{ github.repository_owner }}/web3-discord-bot:latest
            docker-compose down || true
            docker-compose up -d --build
            sleep 10
            curl -f http://localhost:3000/health || echo "Health check endpoint not available"
            echo "Deployment successful"
          EOF

  verify-deployment:
    name: Verify Deployment
    runs-on: ubuntu-latest
    needs: [deploy-self-hosted]

    steps:
      - name: Check deploy URL
        id: url
        run: |
          if [ -n "$DEPLOY_URL" ]; then
            echo "configured=true" >> $GITHUB_OUTPUT
          else
            echo "configured=false" >> $GITHUB_OUTPUT
            echo "DEPLOY_URL not set — skipping verification."
          fi
        env:
          DEPLOY_URL: ${{ secrets.DEPLOY_URL }}

      - name: Check deployment URL
        if: steps.url.outputs.configured == 'true'
        run: curl -f "${{ secrets.DEPLOY_URL }}/health"
